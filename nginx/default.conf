server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Seguridad: cabeceras HTTP
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API → backend container
    location /api/ {
        proxy_pass http://backend_app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Archivos estáticos con cache larga (Angular los versiona por hash)
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html sin cache (es el punto de entrada del SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Todas las rutas del SPA la redirigen a index.html (Angular Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip para transferencias más rápidas
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript image/svg+xml;
}
